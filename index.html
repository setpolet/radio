<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">

<title>TSP FM</title>

<style>

body {
background:#000;
color:#00ff66;
font-family: monospace;
margin:40px;
}

h1 {
font-weight: normal;
}

button {
background:black;
color:#00ff66;
border:1px solid #00ff66;
padding:8px 12px;
font-family: monospace;
cursor:pointer;
}

button:hover {
background:#00ff66;
color:black;
}

audio {
margin-top:10px;
}

.line {
margin:6px 0;
}

input[type=range] {
  accent-color: #00ff66;
  background: black;
}

</style>

</head>

<body>

<h1>TSP FM</h1>

<div class="line">Terminal • Server • Port</div>
<br>

<div class="line">$ connecting to stream...</div>
<div class="line">$ status: ON AIR</div>

<div id="terminal-player" class="line">
  $ PLAYING: <span id="track-name">Radio Stream</span>
  <button id="play-btn">$ PLAY</button>
  <span id="volume-control" style="margin-left:10px; cursor:pointer;">
  $ VOL [<span id="volume-bars">██████████</span>]
</span>
  <div id="progress-bar" style="height:4px; background:#003300; margin-top:4px;">
    <div id="progress-fill" style="width:0%; height:100%; background:#00ff66;"></div>
  </div>
</div>

<script>
const audio = new Audio("https://37af0538e90b5a.lhr.life/radio.mp3");
audio.autoplay = true;

const playBtn = document.getElementById("play-btn");
const progressFill = document.getElementById("progress-fill");

playBtn.addEventListener("click", () => {
  if (audio.paused) {
    audio.play();
    playBtn.textContent = "$ PAUSE";
  } else {
    audio.pause();
    playBtn.textContent = "$ PLAY";
  }
});

audio.addEventListener("timeupdate", () => {
  if(audio.duration) {
    const percent = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = percent + "%";
  }
});

const volumeSlider = document.getElementById("volume-slider");

volumeSlider.addEventListener("input", () => {
  audio.volume = volumeSlider.value;
});

const volumeBars = document.getElementById("volume-bars");

let volume = 1; // от 0 до 1

function updateVolumeDisplay() {
  const totalBars = 10;
  const filledBars = Math.round(volume * totalBars);
  const emptyBars = totalBars - filledBars;

  volumeBars.textContent =
    "█".repeat(filledBars) + "░".repeat(emptyBars);
}

updateVolumeDisplay();

document.getElementById("volume-control").addEventListener("click", () => {
  volume -= 0.1;
  if (volume < 0) volume = 1;

  audio.volume = volume;
  updateVolumeDisplay();
});
  
</script>

<br><br>

<button onclick="location.reload()">
$ reconnect
</button>

</body>
</html>
