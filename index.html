<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>TSP FM</title>
<style>
body {
  background: #000;
  color: #00ff66;
  font-family: monospace;
  margin: 40px;
}
.line {
  margin: 4px 0;
}
#cursor {
  display: inline-block;
  width: 10px;
  animation: blink 1s steps(1) infinite;
}
@keyframes blink {
  0%, 50% { opacity: 1; }
  51%, 100% { opacity: 0; }
}
button {
  background:black;
  color:#00ff66;
  border:1px solid #00ff66;
  padding:8px 12px;
  font-family: monospace;
  cursor:pointer;
}
button:hover {
  background:#00ff66;
  color:black;
}
</style>
</head>
<body>

<h1>TSP FM</h1>
<div class="line">Terminal • Server • Port</div>
<div id="boot"></div>

<audio id="player" controls autoplay style="margin-top:10px; display:none;">
  <source src="ССЫЛКА_ОТ_LTH/radio.mp3" type="audio/mpeg">
</audio>

<br><br>
<button onclick="location.reload()" style="display:none;" id="reconnect">
$ reconnect
</button>

<script>
const bootLines = [
  "$ booting TSP FM...",
  "$ loading music library...",
  "$ starting liquidsoap...",
  "$ connecting to Icecast...",
  "$ stream ready!"
];

const bootDiv = document.getElementById("boot");
const player = document.getElementById("player");
const btn = document.getElementById("reconnect");
let i = 0;

function showLine() {
  if(i < bootLines.length) {
    const line = document.createElement("div");
    line.className = "line";
    line.textContent = bootLines[i] + " ";
    const cursor = document.createElement("span");
    cursor.id = "cursor";
    cursor.textContent = "_";
    line.appendChild(cursor);
    bootDiv.appendChild(line);
    i++;
    setTimeout(showLine, 800); // задержка между строками
  } else {
    // после загрузки — показываем плеер и кнопку
    player.style.display = "block";
    btn.style.display = "inline-block";
  }
}

showLine();
</script>

</body>
</html>
