<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">

<title>TSP FM</title>

<style>

body {
  background:#000;
  color:#00ff66;
  font-family: monospace;
  margin:40px;
}

h1 {
  font-weight: normal;
}

button {
  background:black;
  color:#00ff66;
  border:1px solid #00ff66;
  padding:6px 10px;
  font-family: monospace;
  cursor:pointer;
}

button:hover {
  background:#00ff66;
  color:black;
}

.line {
  margin:6px 0;
}

.bar {
  height:2px;
  background:#00ff66;
  margin-top:10px;
}

</style>

</head>

<body>

<h1>TSP FM</h1>

<div class="line">Terminal • Server • Port</div>
<br>

<div class="line">$ connecting to stream...</div>
<div class="line">$ status: ON AIR</div>

<div class="line">
  $ PLAYING: Radio Stream
  
  <button id="play-btn">$ PLAY</button>

  <span id="volume-control" style="margin-left:10px; cursor:pointer;">
    $ VOL [████████░░]
  </span>
</div>

<div class="bar"></div>

<br>

<button onclick="location.reload()">
  $ reconnect
</button>

<script>

const audio = new Audio("ССЫЛКА_ОТ_LTH/radio.mp3");
audio.autoplay = true;

const playBtn = document.getElementById("play-btn");
const volumeControl = document.getElementById("volume-control");

let volume = 0.8; // стартовая громкость
audio.volume = volume;

// PLAY / PAUSE
playBtn.addEventListener("click", () => {
  if (audio.paused) {
    audio.play();
    playBtn.textContent = "$ PAUSE";
  } else {
    audio.pause();
    playBtn.textContent = "$ PLAY";
  }
});

// Обновление ASCII громкости
function updateVolumeDisplay() {
  let bars = Math.round(volume * 10);
  let filled = "█".repeat(bars);
  let empty = "░".repeat(10 - bars);
  volumeControl.textContent = $ VOL [${filled}${empty}];
}

// Клик = изменение громкости
volumeControl.addEventListener("click", () => {
  volume += 0.1;
  if (volume > 1) volume = 0;
  audio.volume = volume;
  updateVolumeDisplay();
});

// Инициализация
updateVolumeDisplay();

</script>

</body>
</html>
