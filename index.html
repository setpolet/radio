<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>TSP FM</title>
<style>
body {
  background: #000;
  color: #00ff66;
  font-family: monospace;
  margin: 40px;
}
h1 {
  font-weight: normal;
}
.line {
  margin: 6px 0;
}
#cursor {
  display: inline-block;
  width: 10px;
  animation: blink 1s steps(1) infinite;
}
@keyframes blink {
  0%, 50% { opacity: 1; }
  51%, 100% { opacity: 0; }
}
button {
  background: black;
  color: #00ff66;
  border: 1px solid #00ff66;
  padding: 8px 12px;
  font-family: monospace;
  cursor: pointer;
}
button:hover {
  background: #00ff66;
  color: black;
}
audio {
  margin-top: 10px;
  display: none; /* Сначала скрыт, появится после boot */
}
</style>
</head>
<body>

<h1>TSP FM</h1>
<div class="line">Terminal • Server • Port</div>
<br>

<!-- Boot sequence -->
<div id="boot"></div>
