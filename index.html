<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<title>TSP FM</title>

<style>

body{
background:#000;
color:#00ff66;
font-family:monospace;
margin:40px;
}

h1{
font-weight:normal;
}

.line{
margin:6px 0;
}

button{
background:black;
color:#00ff66;
border:1px solid #00ff66;
padding:8px 12px;
font-family:monospace;
cursor:pointer;
}

button:hover{
background:#00ff66;
color:black;
}

audio{
margin-top:10px;
}

.cursor{
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0}
100%{opacity:1}
}

</style>

</head>

<body>

<h1>TSP FM</h1>

<div class="line">Terminal • Server • Port</div>
<br>

<div class="line">$ booting TSP FM<span class="cursor">_</span></div>
<div class="line">$ connecting to stream...</div>
<div class="line">$ status: ON AIR</div>

<br>

<div class="line">$ now playing:</div>
<div class="line" id="track">loading...</div>

<br>

<audio id="player" controls autoplay></audio>

<br><br>

<button onclick="location.reload()">
$ reconnect
</button>


<script>

/* ───────── STREAM ADDRESS ───────── */

const STREAM = "https://f484c455f4963d.lhr.life"

/* ────────────────────────────────── */

document.getElementById("player").src = STREAM + "/radio.mp3"


async function getTrack(){

try{

let res = await fetch(STREAM + "/status-json.xsl")
let data = await res.json()

let title = data.icestats.source.title

document.getElementById("track").innerText = title

}catch{

document.getElementById("track").innerText = "unknown"

}

}

getTrack()

setInterval(getTrack,5000)

</script>


</body>
</html>
